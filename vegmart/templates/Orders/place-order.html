{% extends "base.html" %}

{% block layout %}
<style>
  .product-card {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 10px;
    transition: .2s;
    height: 100%;
  }

  .product-card span {
    display: block;
    font-weight: 600;
    min-height: 40px;
  }

  .product-card small {
    display: block;
    color: #6b7280;
  }

  .product-card {
    cursor: pointer;
  }

  .product-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
  }

  .product-card.selected {
    border: 2px solid #16a34a;
    background: #f0fdf4;
  }

  .product-card img {
    width: 100%;
    height: 60px;
    object-fit: contain;
    border-radius: 8px;
  }

  .qty-box {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }

  .qty-input {
    max-width: 80px;
    text-align: center;
    padding: 6px;
  }

  .order-summary {
    position: sticky;
    top: 20px;
  }

  .cart-row {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
    padding: 6px 0;
  }
</style>

<div class="container-fluid">
  <div class="row card mb-3">
    <div class="card-body pb-0">
      <div class="row">
        <h5>Place Order</h5>

        <div class="col-md-3">
          <input type="text" id="searchProduct" class="form-control" placeholder="Search Product">
        </div>
        <div class="col-md-3">
          <select id="categoryFilter" class="form-control">
            <option value="">All Categories</option>
            {% for c in categories %}
            <option value="{{c.name}}">{{c.name}}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <select id="customer" class="form-control select2-init">
            <option value="">Select Customer</option>
            {% for c in customers %}
            <option value="{{c.id}}">{{c.name}}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" onclick="openModal()">+ New Customer</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8 card">



      <div class="row" id="productGrid">

      </div>
      <div class="d-flex justify-content-center mt-3 mb-3">
        <nav>
          <ul class="pagination" id="pagination"></ul>
        </nav>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card order-summary">
        <div class="card-header">
          <h5>Order Summary</h5>
        </div>
        <div class="card-body">
          <div id="cartItems"></div>

          <hr>

          <h4>Total ₹ <span id="grand_total">0.00</span></h4>

          <select id="payment_mode" class="form-control mb-2">
            <option value="cash">Cash</option>
            <option value="online">Online</option>
            <option value="credit">Credit</option>
          </select>

          <input id="paid" class="form-control mb-2" placeholder="Paid Amount">

          <button class="btn btn-success w-100" onclick="saveOrder()">
            Save Order
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- 🔥 MODAL -->
<div class="modal fade" id="customerModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalTitle">Add Customer</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="customer_id">

        <div class="row">
          <div class="col-md-6"><input id="name" class="form-control mb-2" placeholder="Name"></div>
          <div class="col-md-6"><input id="mobile" class="form-control mb-2" placeholder="Mobile"></div>

          <div class="col-md-6"><input id="address1" class="form-control mb-2" placeholder="Address 1"></div>
          <div class="col-md-6"><input id="address2" class="form-control mb-2" placeholder="Address 2"></div>

          <div class="col-md-4"><input id="area" class="form-control mb-2" placeholder="Area"></div>
          <div class="col-md-4"><input id="city" class="form-control mb-2" placeholder="City"></div>
          <div class="col-md-4"><input id="pincode" class="form-control mb-2" placeholder="Pincode"></div>

          <div class="col-md-6"><input id="gst" class="form-control mb-2" placeholder="GST"></div>

          <div class="col-md-6">
            <select id="type" class="form-control mb-2 select2-init">
              <option value="b2c">B2C</option>
              <option value="b2b">B2B</option>
            </select>
          </div>

          <div class="col-md-6"><input id="credit_days" class="form-control mb-2" placeholder="Credit Days"></div>
          <div class="col-md-6"><input id="balance" class="form-control mb-2" placeholder="Opening Balance"></div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
      </div>

    </div>
  </div>
</div>
{% endblock %}
{% block page_js %}
{{block.super}}
<script>
  let cart = [];
  $(document).ready(function () {
    loadProducts();
  });
  let categoryFilter = "";

  $("#categoryFilter").change(function () {

    categoryFilter = $(this).val();

    loadProducts(1);

  });
  let variants = {};
  function changeQty(id, change) {
    let input = $("#qty" + id);
    let qty = parseInt(input.val() || 0);
    qty = Math.max(0, qty + change);
    input.val(qty);
    updateCartFromInput(id);
  }

  function updateCartFromInput(id) {
    let qty = parseInt($("#qty" + id).val() || 0);

    cart = cart.filter(x => x.product_variant != id);

    if (qty > 0) {
      cart.push({
        product_variant: id,
        quantity: qty,
        price: variants[id].price,
        name: variants[id].name,
        image_url: variants[id].image
      });
      $("#card" + id).addClass("selected");
    } else {
      $("#card" + id).removeClass("selected");
    }

    renderCart();
  }

  function renderCart() {
    let html = '';
    let total = 0;

    cart.forEach(item => {
      let rowTotal = item.quantity * item.price;
      total += rowTotal;

      html += `
<div class="cart-row">
<div>
<b>${item.name}</b><br>
${item.quantity} × ₹${item.price}
</div>
<div>₹${rowTotal.toFixed(2)}</div>
</div>`;
    });

    if (cart.length === 0) {
      html = "<p>No products selected</p>";
    }

    $("#cartItems").html(html);
    $("#grand_total").text(total.toFixed(2));
  }

  $("#searchProduct").on(
    "keyup",
    debounce(function () {

      searchText = $(this).val();

      loadProducts(1);

    }, 500)
  );
  function debounce(func, delay) {

    let timer;

    return function () {

      clearTimeout(timer);

      timer = setTimeout(
        () => func.apply(this, arguments),
        delay
      );

    };

  }
  // ==================== PAGINATION ====================

  let currentPage = 1;
  let searchText = "";
  function loadProducts(page = 1) {
    let pageSize = 12;
    currentPage = page;
    $("#productGrid").html(`
      <div class="col-12 text-center">
          Loading...
      </div>
      `);
    $.ajax({
      url: hosturl + "/api/Masters/productvariant_list_pagination_api",
      type: "POST",

      data: {
        csrfmiddlewaretoken: "{{csrf_token}}",
        p: page,
        search: searchText,
        category: categoryFilter,
        page_size: pageSize
      },

      success: function (res) {

        renderProducts(res.results);

        let totalPages = Math.ceil(
          res.count / pageSize
        );

        buildPagination(
          totalPages,
          page
        );

      },

      error: function (err) {
        console.log(err);
      }
    });

  }
  function buildPagination(totalPages, current) {

    let html = "";

    html += `
    <li class="page-item ${current == 1 ? 'disabled' : ''}">
        <a class="page-link"
           href="javascript:void(0)"
           onclick="loadProducts(${current - 1})">
           Previous
        </a>
    </li>
    `;

    for (let i = 1; i <= totalPages; i++) {

      html += `
        <li class="page-item ${i == current ? 'active' : ''}">
            <a class="page-link"
               href="javascript:void(0)"
               onclick="loadProducts(${i})">
                ${i}
            </a>
        </li>
        `;
    }

    html += `
    <li class="page-item ${current == totalPages ? 'disabled' : ''}">
        <a class="page-link"
           href="javascript:void(0)"
           onclick="loadProducts(${current + 1})">
           Next
        </a>
    </li>
    `;

    $("#pagination").html(html);
  }
  function renderProducts(products) {

    let html = "";

    products.forEach(v => {
      variants[v.id] = {
        price: v.b2b_price,
        name: v.product_name,
        image: v.image
      };
      html += `
        <div class="col-md-3 mb-3">

            <div class="product-card"
                 id="card${v.id}">

                <img
                    src="${hosturl}${v.image}"
                    onerror="this.src='/static/no-image.png'">

                <span>${v.product_name}</span>

                <small>
                    ${v.pack_size}
                    ${v.product_unit}
                </small>

                <div>
                    ₹${v.b2b_price}
                </div>

                <div class="qty-box mt-2">

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="changeQty('${v.id}',-1)">
                        -
                    </button>

                    <input
                        type="number"
                        min="0"
                        value="${cart.find(x => x.product_variant == v.id)?.quantity || 0
        }"
                        id="qty${v.id}"
                        class="form-control qty-input"
                        onchange="updateCartFromInput('${v.id}')">

                    <button
                        class="btn btn-success btn-sm"
                        onclick="changeQty('${v.id}',1)">
                        +
                    </button>

                </div>

            </div>

        </div>
        `;


    });

    $("#productGrid").html(html);

    cart.forEach(item => {
      $("#card" + item.product_variant)
        .addClass("selected");
    });
  }



  function saveOrder() {
    if (!$("#customer").val()) {
      swal(
        "Error",
        "Please select customer",
        "error"
      );
      return;
    }
    if (cart.length === 0) {
      swal("Error", "Select products", "error");
      return;
    }

    let fd = new FormData();

    fd.append('csrfmiddlewaretoken', '{{csrf_token}}');
    fd.append('customer_id', $("#customer").val());
    fd.append('payment_mode', $("#payment_mode").val());
    fd.append('paid_amount', $("#paid").val());
    fd.append('items', JSON.stringify(cart));

    $.ajax({
      url: hosturl + "/api/Orders/createorder",
      type: "POST",
      data: fd,
      processData: false,
      contentType: false,
      success: function (res) {

        if (res.response.n == 1) {
          swal("Success", "Order Created", "success")
            .then(() => location.reload());
        } else {
          swal("Error", res.response.msg, "error");
        }
      }
    });
  }
  function openModal() {

    $("#name").val("");
    $("#mobile").val("");
    $("#address1").val("");
    $("#area").val("");
    $("#city").val("");
    $("#pincode").val("");

    $("#customerModal").modal("show");

  }


  function saveCustomer() {

    // Get values
    let id = $("#customer_id").val();

    let name = $("#name").val().trim();
    let mobile = $("#mobile").val().trim();
    let address1 = $("#address1").val().trim();
    let address2 = $("#address2").val().trim();
    let area = $("#area").val().trim();
    let city = $("#city").val().trim();
    let pincode = $("#pincode").val().trim();
    let gst = $("#gst").val().trim();
    let type = $("#type").val();
    let credit_days = $("#credit_days").val().trim();
    let balance = $("#balance").val().trim();

    // ================= VALIDATION =================

    // Name
    if (name === "") {
      swal("Validation Error", "Please enter customer name", "warning");
      $("#name").focus();
      return;
    }

    // Mobile
    if (mobile === "") {
      swal("Validation Error", "Please enter mobile number", "warning");
      $("#mobile").focus();
      return;
    }

    if (!/^[0-9]{10}$/.test(mobile)) {
      swal("Validation Error", "Mobile number must be 10 digits", "warning");
      $("#mobile").focus();
      return;
    }

    // Address
    if (address1 === "") {
      swal("Validation Error", "Please enter address", "warning");
      $("#address1").focus();
      return;
    }

    // Area
    if (area === "") {
      swal("Validation Error", "Please enter area", "warning");
      $("#area").focus();
      return;
    }

    // City
    if (city === "") {
      swal("Validation Error", "Please enter city", "warning");
      $("#city").focus();
      return;
    }

    // Pincode
    if (pincode !== "" && !/^[0-9]{6}$/.test(pincode)) {
      swal("Validation Error", "Pincode must be 6 digits", "warning");
      $("#pincode").focus();
      return;
    }

    // GST Validation (Optional)
    if (gst !== "" && !/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/.test(gst)) {
      swal("Validation Error", "Please enter valid GST number", "warning");
      $("#gst").focus();
      return;
    }

    // Credit Days
    if (credit_days !== "" && isNaN(credit_days)) {
      swal("Validation Error", "Credit days must be numeric", "warning");
      $("#credit_days").focus();
      return;
    }

    // Opening Balance
    if (balance !== "" && isNaN(balance)) {
      swal("Validation Error", "Opening balance must be numeric", "warning");
      $("#balance").focus();
      return;
    }

    // ================= API =================

    let url = id
      ? "/api/Customers/customerupdate"
      : "/api/Customers/addcustomer";

    let fd = new FormData();

    fd.append('csrfmiddlewaretoken', '{{csrf_token}}');

    if (id) {
      fd.append('customerid', id);
    }

    fd.append('name', name);
    fd.append('mobile', mobile);
    fd.append('address_line1', address1);
    fd.append('address_line2', address2);
    fd.append('area', area);
    fd.append('city', city);
    fd.append('pincode', pincode);
    fd.append('gst_number', gst);
    fd.append('customer_type', type);
    fd.append('default_credit_days', credit_days);
    fd.append('outstanding_balance', balance);

    $.ajax({
      url: hosturl + url,
      type: "POST",
      data: fd,
      processData: false,
      contentType: false,

      success: function (res) {

        if (res.response.n == 1) {

          swal("Success", res.response.msg, "success");

          $("#customerModal").modal('hide');

          $("#customer").append(
            `<option value="${res.data.id}" selected>
        ${name}
    </option>`
          ).trigger("change");
        } else {

          swal("Error", res.response.msg, "error");

        }
      },

      error: function () {
        swal("Error", "Something went wrong", "error");
      }
    });
  }


</script>
{% endblock %}

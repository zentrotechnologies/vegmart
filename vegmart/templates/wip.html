{% extends "base.html" %}

{% block layout %}
<style>

.coming-wrapper {
    height: 85vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fb, #eef1f6);
}

/* TOP BAR */
.top-bar {
    margin-bottom: 20px;
}

.btn-back {
    background: #fff;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    color: #333;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.btn-back:hover {
    background: #f0f0f0;
}

/* CARD */
.coming-card {
    margin: auto;
    text-align: center;
    background: #fff;
    padding: 40px 50px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 450px;
    width: 100%;
}

/* ICON */
.icon {
    font-size: 60px;
    margin-bottom: 15px;
}

/* TEXT */
.coming-card h2 {
    font-weight: 600;
    margin-bottom: 10px;
}

.coming-card p {
    color: #666;
    font-size: 15px;
}

/* PROGRESS */
.progress-box {
    height: 8px;
    background: #eee;
    border-radius: 10px;
    margin: 20px 0 8px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: #4a90e2;
    border-radius: 10px;
    transition: width 0.5s;
}

small {
    color: #888;
}

</style>
<div class="coming-wrapper">

    <!-- 🔹 BACK BUTTON -->
    <div class="top-bar">
        <a href="javascript:history.back()" class="btn-back">
            ← Back
        </a>
    </div>

    <!-- 🔹 MAIN CONTENT -->
    <div class="coming-card">

        <div class="icon">🚧</div>

        <h2>Coming Soon</h2>

        <p>
            This module is currently under development.<br>
            We’re working to bring this feature live very soon.
        </p>

        <!-- OPTIONAL PROGRESS -->
        <div class="progress-box">
            <div class="progress-bar" style="width: 65%"></div>
        </div>
        <small>65% Completed</small>

    </div>

</div>

{% endblock %}

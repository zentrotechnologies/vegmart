{% extends "base.html" %}

{% block layout %}
<div class="card">
  <div class="card-header"><h5>Edit Product</h5></div>
  <div class="card-body">
    <div class="row">
        <div class="col">
    <input id="name" value="{{product.name}}" class="form-control mb-3">

        </div>
        <div class="col">
    <input id="sku" value="{{product.sku}}" class="form-control mb-3">

        </div>
        <div class="col">
    <input id="hsn_code" value="{{product.hsn_code}}" class="form-control mb-3">

        </div>
        <div class="col">
            
    <select id="category" class="form-control mb-3 select2-init">
      {% for c in categories %}
        <option value="{{c.id}}" {% if c.id == product.category %}selected{% endif %}>{{c.name}}</option>
      {% endfor %}
    </select>
        </div>
        <div class="col">
            
    <select id="sub_category" class="form-control mb-3 select2-init">
      {% for s in subcategories %}
        <option value="{{s.id}}" {% if s.id == product.sub_category %}selected{% endif %}>{{s.name}}</option>
      {% endfor %}
    </select>
        </div>
        <div class="col">
                <select id="unit" class="form-control mb-3 select2-init">
        <option value="ml" {% if product.unit == 'ml' %}selected{% endif %}>ml</option>
        <option value="gm" {% if product.unit == 'gm' %}selected{% endif %}>gm</option>
    </select>
        </div>
        <div class="col">
    <input id="brand" value="{{product.brand}}" class="form-control mb-3">

        </div>
    </div>
    <!-- PRODUCT -->




    <hr>

    <!-- VARIANTS -->
    <h5>Variants</h5>

    <div class="row mb-3">
      <div class="col"><input id="pack_size" class="form-control" placeholder="Pack Size"></div>
      <div class="col"><input id="pack_type" class="form-control" placeholder="Pack Type"></div>
      <div class="col"><input id="fat" class="form-control" placeholder="Fat"></div>
      <div class="col"><input id="snf" class="form-control" placeholder="SNF"></div>
    </div>

    <div class="row mb-3">
      <div class="col"><input id="gst_rate" class="form-control" placeholder="GST %"></div>
      <div class="col"><input id="mrp" class="form-control" placeholder="MRP"></div>
      <div class="col"><input id="b2b_price" class="form-control" placeholder="B2B Price"></div>
      <div class="col"><input type="file" id="image" class="form-control"></div>
      <div class="col">
        <button class="btn btn-success" onclick="addVariant()">Add</button>
      </div>
    </div>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>#</th>
          <th>Pack</th>
          <th>Fat/SNF</th>
          <th>GST</th>
          <th>MRP</th>
          <th>B2B</th>
          <th>Image</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="variant_table"></tbody>
    </table>

    <button class="btn btn-primary" onclick="updateProduct()">Update</button>

  </div>
</div>
{% endblock %}

{% block page_js %}
{{block.super}}
<script>

let variants = [];
let editIndex = -1; // ✅ FIXED

{% for v in variants %}
variants.push({
    pack_size: "{{v.pack_size}}",
    pack_type: "{{v.pack_type}}",
    fat: "{{v.fat}}" || null,
    snf: "{{v.snf}}" || null,
    gst_rate: "{{v.gst_rate}}" || 0,
    mrp: "{{v.mrp}}",
    b2b_price: "{{v.b2b_price}}",
    image_url: "{{v.image_url}}" // ✅ FIXED
});
{% endfor %}

$(document).ready(function(){
    renderVariants();
});

function addVariant(){

    let pack_size=$("#pack_size").val().trim();
    let pack_type=$("#pack_type").val().trim();
    let fat=$("#fat").val();
    let snf=$("#snf").val();
    let gst_rate=$("#gst_rate").val();
    let mrp=$("#mrp").val();
    let b2b_price=$("#b2b_price").val();
    let image=$("#image")[0].files[0];

    if(!pack_size || !mrp){
        swal("Error","Pack size & MRP required","error");
        return;
    }

    let image_url = image ? URL.createObjectURL(image) : null;

    let obj = {
        pack_size,
        pack_type,
        fat: fat ? parseFloat(fat) : null,
        snf: snf ? parseFloat(snf) : null,
        gst_rate: gst_rate ? parseFloat(gst_rate) : 0,
        mrp: parseFloat(mrp),
        b2b_price: b2b_price ? parseFloat(b2b_price) : 0,
        image: image,
        image_url: image_url
    };

    if(editIndex === -1){
        variants.push(obj);
    } else {
        // ✅ KEEP OLD IMAGE IF NOT CHANGED
        if(!image){
            obj.image_url = variants[editIndex].image_url;
        }
        variants[editIndex] = obj;
        editIndex = -1;
        $(".btn-success").text("Add");
    }

    renderVariants();

    $("#pack_size,#pack_type,#fat,#snf,#gst_rate,#mrp,#b2b_price,#image").val('');
}

function renderVariants(){
    let html="";
    variants.forEach((v,i)=>{
      console.log("v",v)
        html+=`
        <tr>
            <td>${i+1}</td>
            <td>${v.pack_size} (${v.pack_type})</td>
            <td>${v.fat||'-'} / ${v.snf||'-'}</td>
            <td>${v.gst_rate}</td>
            <td>${v.mrp}</td>
            <td>${v.b2b_price}</td>
            <td>${v.image_url ? `<img src="${v.image_url}" width="40">` : ''}</td>
            <td>
                <button onclick="editVariant(${i})" class="btn btn-info btn-sm">Edit</button>
                <button onclick="removeVariant(${i})" class="btn btn-danger btn-sm">Delete</button>
            </td>
        </tr>`;
    });
    $("#variant_table").html(html);
}

function editVariant(index){
    let v = variants[index];

    $("#pack_size").val(v.pack_size);
    $("#pack_type").val(v.pack_type);
    $("#fat").val(v.fat);
    $("#snf").val(v.snf);
    $("#gst_rate").val(v.gst_rate);
    $("#mrp").val(v.mrp);
    $("#b2b_price").val(v.b2b_price);

    editIndex = index;
    $(".btn-success").text("Update Variant");
}

function removeVariant(i){
    variants.splice(i,1);
    renderVariants();
}

function updateProduct(){

    let fd=new FormData();

    fd.append('csrfmiddlewaretoken','{{csrf_token}}');
    fd.append('productid','{{product.id}}');
    fd.append('name',$("#name").val());
    fd.append('sku',$("#sku").val());
    fd.append('hsn_code',$("#hsn_code").val());
    fd.append('category',$("#category").val());
    fd.append('sub_category',$("#sub_category").val());
    fd.append('brand',$("#brand").val());
    fd.append('unit',$("#unit").val());

    variants.forEach((v,i)=>{
        fd.append(`variants[${i}][pack_size]`, v.pack_size);
        fd.append(`variants[${i}][pack_type]`, v.pack_type);
        fd.append(`variants[${i}][fat]`, v.fat);
        fd.append(`variants[${i}][snf]`, v.snf);
        fd.append(`variants[${i}][gst_rate]`, v.gst_rate);
        fd.append(`variants[${i}][mrp]`, v.mrp);
        fd.append(`variants[${i}][b2b_price]`, v.b2b_price);

        if(v.image){
            fd.append(`variants[${i}][image]`, v.image);
        } else if(v.image_url){
            fd.append(`variants[${i}][image_url]`, v.image_url);
        }
    });

    $.ajax({
        url: hosturl+"/masters/edit-product/{{product.id}}",
        type:"POST",
        data:fd,
        processData:false,
        contentType:false,
        success:function(res){
            if(res.response.n==1){
                swal("Updated","","success").then(()=>location.href="/masters/product-list");
            }else{
                swal("Error",res.response.msg,"error");
            }
        }
    });
}

</script>
{% endblock %}

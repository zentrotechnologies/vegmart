{% extends "base.html" %}

{% block layout %}
<div class="row">
  <div class="col-xl">
    <div class="card">
      <div class="card-header">
        <h5>Add SubCategory</h5>
      </div>

      <div class="card-body">
        <form>
          {% csrf_token %}

          <div class="form-floating mb-4">
            <input type="text" id="name" class="form-control" placeholder="Name">
            <label>Name</label>
          </div>

          <div class="form-floating mb-4">
            <select id="category" class="form-select select2-init">
              <option value="">Select Category</option>
              {% for c in categories %}
                <option value="{{c.id}}">{{c.name}}</option>
              {% endfor %}
            </select>
            <label>Category</label>
          </div>

          <div class="btn btn-primary" onclick="return validation()">Submit</div>
          <div class="btn btn-danger">Cancel</div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block page_js %}
{{block.super}}

<script>
function validation(){
    var name = $("#name").val().trim();
    var category = $("#category").val();

    if(IsValid(name)){
        swal("Error","Enter name","error");
        return false;
    }

    if(IsValid(category)){
        swal("Error","Select category","error");
        return false;
    }

    var fd = new FormData();
    fd.append('csrfmiddlewaretoken','{{csrf_token}}');
    fd.append('name',name);
    fd.append('category',category);

    $.ajax({
        url: hosturl + "/masters/add-subcategory",
        type:'POST',
        data:fd,
        processData:false,
        contentType:false,
        success:function(res){
            if(res.response.n==1){
                swal("Success",res.response.msg,"success").then(()=>{
                    window.location.href = hosturl + "/masters/subcategory-list";
                });
            }else{
                swal("Error",res.response.msg,"error");
            }
        }
    });
}
</script>
{% endblock %}
